<script type="text/babel" data-presets="react" data-pragma="React.createElement" data-pragma-frag="React.Fragment">

 

const { useState, useEffect, useRef, useMemo } = React;

 

/* ---------------------------------------------------------

   簡易圖示元件（純 SVG，不依賴外部圖示庫）

--------------------------------------------------------- */

function Icon({ d, size = 16, ...rest }) {

  return (

    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor"

      strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...rest}>

      <path d={d} />

    </svg>

  );

}

const Wallet = (p) => <Icon {...p} d="M21 7H5a2 2 0 0 1-2-2 2 2 0 0 1 2-2h14v4M3 5v14a2 2 0 0 0 2 2h16v-4M18 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4z" />;

const TrendingUp = (p) => <Icon {...p} d="M3 17l6-6 4 4 8-8M17 7h4v4" />;

const ShieldCheck = (p) => <Icon {...p} d="M12 2l8 4v6c0 5-4 8-8 10-4-2-8-5-8-10V6l8-4zM9 12l2 2 4-4" />;

const PiggyBank = (p) => <Icon {...p} d="M19 9a2 2 0 0 0-2-2h-1l-2-2H8l-2 2H5a2 2 0 0 0-2 2v3l-1 1v2h2l1 3h3v-2h4v2h3l1-3h2v-2l-1-1V9zM15 9h.01" />;

const Plus = (p) => <Icon {...p} d="M12 5v14M5 12h14" />;

const Trash2 = (p) => <Icon {...p} d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0-1 14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2L4 6h16z" />;

const AlertTriangle = (p) => <Icon {...p} d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0zM12 9v4M12 17h.01" />;

const FileSpreadsheet = (p) => <Icon {...p} d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zM8 13h8M8 17h8M8 9h1" />;

const FileText = (p) => <Icon {...p} d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zM8 13h8M8 17h8M8 9h2" />;

const Landmark = (p) => <Icon {...p} d="M3 21h18M5 21V10M19 21V10M3 10l9-6 9 6M9 21v-7M15 21v-7" />;

const Banknote = (p) => <Icon {...p} d="M2 6h20v12H2zM12 9a3 3 0 1 0 0 6 3 3 0 0 0 0-6zM6 6v0M18 18v0" />;

const ArrowDownCircle = (p) => <Icon {...p} d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zM8 12l4 4 4-4M12 8v8" />;

const Layers = (p) => <Icon {...p} d="M12 2 2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5" />;

const Gauge = (p) => <Icon {...p} d="M12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4zM12 14l3-3M2 12a10 10 0 1 1 20 0" />;

const Coins = (p) => <Icon {...p} d="M8 8a6 4 0 1 0 12 0 6 4 0 1 0-12 0zM2 16a6 4 0 1 0 12 0M2 16V8M8 12v4" />;

 

/* ---------------------------------------------------------

   本機儲存（localStorage 取代雲端同步）

--------------------------------------------------------- */

const storage = {

  async get(key) {

    const v = localStorage.getItem(key);

    if (v === null) return null;

    return { value: v };

  },

  async set(key, value) {

    localStorage.setItem(key, value);

    return { value };

  },

};

 

/* ---------------------------------------------------------

   資料定義

--------------------------------------------------------- */

const ASSET_GROUPS = [

  { key: "low", label: "低波動資產", color: "#4F7A6B", Icon: Landmark, presets: ["現金", "定存", "儲蓄險", "壽險保價金"] },

  { key: "mid", label: "中波動資產", color: "#B98B2A", Icon: Layers, presets: ["外幣", "基金", "投資型保單"] },

  { key: "high", label: "高波動資產", color: "#A24B3F", Icon: TrendingUp, presets: ["房地產", "股票", "衍生性金融商品"] },

];

 

const INCOME_GROUPS = [

  { key: "active", label: "主動收入", Icon: Banknote, presets: ["月薪", "斜槓收入", "年終獎金", "其他獎金"] },

  { key: "passive", label: "被動收入", Icon: Coins, presets: ["保險生存金", "定存利息", "配息", "房租收入"] },

];

 

const EXPENSE_PRESETS = ["孝親費","伙食費","日用品","治裝費","個人保養","房貸","汽機車貸款","房租","水電瓦斯管理費","房屋稅金","所得稅","油錢","汽機車保養","車險","子女教育金","成長進修費","娛樂費","訂閱費","信貸","網路電話費","婚喪喜慶","寵物開支","醫療費用","旅遊費"];

const SAVING_PRESETS = ["股票","定存","基金","壽險","投資型保單","外幣"];

const RISK_PRESETS = ["社會保險","保障型保險","產險"];

 

const INK = "#22271F";

const PAPER = "#F6F3EC";

const LINE = "#DAD4C4";

 

let _id = 0;

const nid = () => `i${Date.now()}_${_id++}`;

 

function monthly(item) {

  const a = parseFloat(item.amount) || 0;

  return item.freq === "year" ? a / 12 : a;

}

function fmt(n) {

  const v = Math.round(n || 0);

  return v.toLocaleString("zh-Hant-TW");

}

function pct(n) {

  return `${Math.round((n || 0) * 100)}%`;

}

 

function Light({ level }) {

  const map = {

    green: { c: "#1F7A3D", bg: "#E3F3E6", label: "綠燈" },

    yellow: { c: "#A6760A", bg: "#FBEFD6", label: "黃燈" },

    red: { c: "#C53A2E", bg: "#FBE2DE", label: "紅燈" },

  };

  const { c, bg, label } = map[level] || map.yellow;

  return (

    <span style={{

      display: "inline-flex", alignItems: "center", gap: 7, color: c, background: bg,

      fontWeight: 800, fontSize: 13, padding: "5px 12px", borderRadius: 999, border: `1.5px solid ${c}`,

    }}>

      <span style={{ width: 10, height: 10, borderRadius: "50%", background: c, boxShadow: `0 0 0 3px ${c}33` }} />

      {label}

    </span>

  );

}

 

function ItemRow({ item, onChange, onRemove, showFreq, locked, labelWidth }) {

  return (

    <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "7px 0", borderBottom: `1px solid ${LINE}` }}>

      {locked ? (

        <span style={{ flex: `0 0 ${labelWidth}px`, fontSize: 14, color: INK, fontFamily: "'Noto Sans TC', sans-serif" }}>

          {item.name}

        </span>

      ) : (

        <input

          value={item.name}

          onChange={(e) => onChange({ ...item, name: e.target.value })}

          placeholder="項目名稱"

          style={{

            flex: `0 0 ${labelWidth}px`, minWidth: 0, border: "none", borderBottom: `1px dashed ${LINE}`, background: "transparent",

            fontFamily: "'Noto Sans TC', sans-serif", fontSize: 14, color: INK, padding: "4px 2px",

          }}

        />

      )}

      <input

        type="number"

        value={item.amount}

        onChange={(e) => onChange({ ...item, amount: e.target.value })}

        placeholder="輸入金額"

        style={{

          flex: "1 1 auto", minWidth: 0, border: `1px solid ${LINE}`, borderRadius: 6, padding: "6px 10px",

          fontFamily: "'IBM Plex Mono', monospace", fontSize: 14, textAlign: "right", color: INK, background: "#fff",

        }}

      />

      {showFreq && (

        <select

          value={item.freq}

          onChange={(e) => onChange({ ...item, freq: e.target.value })}

          style={{

            border: `1px solid ${LINE}`, borderRadius: 6, padding: "6px 6px", fontSize: 12,

            fontFamily: "'Noto Sans TC', sans-serif", color: INK, background: "#fff",

          }}

        >

          <option value="month">月繳</option>

          <option value="year">年繳</option>

        </select>

      )}

      {!locked && (

        <button

          onClick={onRemove}

          aria-label="刪除項目"

          style={{ border: "none", background: "transparent", color: "#9B9181", cursor: "pointer", padding: 4 }}

        >

          <Trash2 size={15} />

        </button>

      )}

    </div>

  );

}

 

function CategoryBlock({ title, accent, items, setItems, presets, showFreq, subtotalLabel, icon }) {

  const presetRows = presets.map((name) => {

    const found = items.find((it) => it.name === name);

    return found || { id: null, name, amount: "", freq: "month" };

  });

  const customRows = items.filter((it) => !presets.includes(it.name));

 

  const updatePreset = (name, next) => {

    const exists = items.some((it) => it.name === name);

    if (exists) {

      setItems(items.map((it) => (it.name === name ? next : it)));

    } else {

      setItems([...items, { ...next, id: nid(), name }]);

    }

  };

  const updateCustom = (id, next) => setItems(items.map((it) => (it.id === id ? next : it)));

  const removeCustom = (id) => setItems(items.filter((it) => it.id !== id));

  const addCustom = () => setItems([...items, { id: nid(), name: "", amount: "", freq: "month" }]);

 

  const subtotal = items.reduce((s, it) => s + (showFreq ? monthly(it) : parseFloat(it.amount) || 0), 0);

  const labelWidth = 96;

 

  return (

    <div style={{ marginBottom: 22 }}>

      <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 8 }}>

        <h3 style={{ margin: 0, display: "flex", alignItems: "center", gap: 7, fontFamily: "'Noto Serif TC', serif", fontSize: 16, color: accent, fontWeight: 700 }}>

          {icon}{title}

        </h3>

        <span style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 13, color: INK }}>

          {subtotalLabel || "小計"} {fmt(subtotal)}

        </span>

      </div>

 

      {presetRows.map((row) => (

        <ItemRow

          key={row.name}

          item={row}

          locked

          labelWidth={labelWidth}

          showFreq={showFreq}

          onChange={(n) => updatePreset(row.name, n)}

        />

      ))}

      {customRows.map((it) => (

        <ItemRow

          key={it.id}

          item={it}

          labelWidth={labelWidth}

          showFreq={showFreq}

          onChange={(n) => updateCustom(it.id, n)}

          onRemove={() => removeCustom(it.id)}

        />

      ))}

 

      <button

        onClick={addCustom}

        style={{

          border: `1px dashed ${LINE}`, color: INK, background: "transparent", borderRadius: 999,

          fontSize: 12, padding: "5px 12px", marginTop: 10, cursor: "pointer", display: "inline-flex", alignItems: "center", gap: 4,

          fontFamily: "'Noto Sans TC', sans-serif",

        }}

      >

        <Plus size={12} /> 自訂項目

      </button>

    </div>

  );

}

 

function IndicatorCard({ icon, title, value, target, level, advice }) {

  const borderColor = { green: "#1F7A3D", yellow: "#A6760A", red: "#C53A2E" }[level] || LINE;

  return (

    <div style={{ background: "#fff", border: `1px solid ${LINE}`, borderLeft: `5px solid ${borderColor}`, borderRadius: 14, padding: 18, flex: "1 1 220px" }}>

      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>

        <div style={{ display: "flex", alignItems: "center", gap: 8, color: INK }}>

          {icon}

          <span style={{ fontFamily: "'Noto Serif TC', serif", fontWeight: 700, fontSize: 15 }}>{title}</span>

        </div>

        <Light level={level} />

      </div>

      <div style={{ fontFamily: "'IBM Plex Mono', monospace", fontSize: 28, color: INK, lineHeight: 1 }}>{value}</div>

      <div style={{ fontSize: 12, color: "#9B9181", marginTop: 4 }}>建議區間：{target}</div>

      <div style={{ fontSize: 13, color: "#5A5443", marginTop: 10, lineHeight: 1.5 }}>{advice}</div>

    </div>

  );

}

 

function FinancialHealthApp() {

  const [tab, setTab] = useState("asset");

  const [loaded, setLoaded] = useState(false);

 

  const [name, setName] = useState("");

  const [assets, setAssets] = useState({ low: [], mid: [], high: [] });

  const [income, setIncome] = useState({ active: [], passive: [] });

  const [expense, setExpense] = useState([]);

  const [saving, setSaving] = useState([]);

  const [risk, setRisk] = useState([]);

 

  const saveTimer = useRef(null);

 

  useEffect(() => {

    (async () => {

      try {

        const res = await storage.get("financial-health-data");

        if (res && res.value) {

          const d = JSON.parse(res.value);

          setName(d.name || "");

          setAssets(d.assets || { low: [], mid: [], high: [] });

          setIncome(d.income || { active: [], passive: [] });

          setExpense(d.expense || []);

          setSaving(d.saving || []);

          setRisk(d.risk || []);

        }

      } catch (e) {

        // 沒有舊資料，使用預設空狀態

      } finally {

        setLoaded(true);

      }

    })();

  }, []);

 

  useEffect(() => {

    if (!loaded) return;

    clearTimeout(saveTimer.current);

    saveTimer.current = setTimeout(async () => {

      try {

        await storage.set(

          "financial-health-data",

          JSON.stringify({ name, assets, income, expense, saving, risk })

        );

      } catch (e) {

        console.error("儲存失敗", e);

      }

    }, 400);

    return () => clearTimeout(saveTimer.current);

  }, [name, assets, income, expense, saving, risk, loaded]);

 

  const calc = useMemo(() => {

    const sumStatic = (arr) => arr.reduce((s, it) => s + (parseFloat(it.amount) || 0), 0);

    const sumMonthly = (arr) => arr.reduce((s, it) => s + monthly(it), 0);

 

    const totalLow = sumStatic(assets.low);

    const totalMid = sumStatic(assets.mid);

    const totalHigh = sumStatic(assets.high);

    const totalAssets = totalLow + totalMid + totalHigh || 1;

 

    const totalIncome = sumMonthly(income.active) + sumMonthly(income.passive);

    const totalExpense = sumMonthly(expense);

    const totalSaving = sumMonthly(saving);

    const totalRisk = sumMonthly(risk);

    const incomeSafe = totalIncome || 1;

 

    const lifeRatio = totalExpense / incomeSafe;

    const savingRatio = totalSaving / incomeSafe;

    const riskRatio = totalRisk / incomeSafe;

 

    const cashLike = [...assets.low].filter((it) => ["現金", "定存"].includes(it.name));

    const cashTotal = sumStatic(cashLike);

    const emergencyMonths = totalExpense > 0 ? cashTotal / totalExpense : 0;

 

    const lifeLevel = lifeRatio <= 0.6 ? "green" : lifeRatio <= 0.7 ? "yellow" : "red";

    const savingLevel = savingRatio >= 0.3 ? "green" : savingRatio >= 0.15 ? "yellow" : "red";

    const riskLevel =

      riskRatio >= 0.05 && riskRatio <= 0.15 ? "green" : riskRatio < 0.05 || (riskRatio > 0.15 && riskRatio <= 0.2) ? "yellow" : "red";

    const emergencyLevel = emergencyMonths >= 6 ? "green" : emergencyMonths >= 3 ? "yellow" : "red";

 

    const highPct = totalHigh / totalAssets;

    const lowPct = totalLow / totalAssets;

    let assetLevel = "green";

    let assetNote = "資產配置分布尚屬均衡。";

    if (highPct > 0.5) {

      assetLevel = "red";

      assetNote = "高波動資產佔比過高，市場波動時資產價值可能大幅震盪，建議檢視配置。";

    } else if (lowPct > 0.8 && totalSaving === 0) {

      assetLevel = "yellow";

      assetNote = "資產多集中於低波動工具且目前無投資支出，長期成長性可能不足。";

    }

 

    const levels = [lifeLevel, savingLevel, riskLevel, emergencyLevel, assetLevel];

    const score = levels.reduce((s, l) => s + (l === "green" ? 2 : l === "yellow" ? 1 : 0), 0);

    const maxScore = levels.length * 2;

    const ratioScore = score / maxScore;

    const grade = ratioScore >= 0.85 ? "A" : ratioScore >= 0.6 ? "B" : ratioScore >= 0.35 ? "C" : "D";

    const redCount = levels.filter((l) => l === "red").length;

 

    return {

      totalLow, totalMid, totalHigh, totalAssets,

      totalIncome, totalExpense, totalSaving, totalRisk,

      lifeRatio, savingRatio, riskRatio, emergencyMonths,

      lifeLevel, savingLevel, riskLevel, emergencyLevel, assetLevel, assetNote,

      highPct, lowPct, grade, redCount,

    };

  }, [assets, income, expense, saving, risk]);

 

  const gradeColor = { A: "#3E7A4F", B: "#6E8B3A", C: "#B98B2A", D: "#A24B3F" }[calc.grade];

  const gradeText = {

    A: "財務體質優良，各項指標表現穩健。",

    B: "財務體質良好，部分指標尚有調整空間。",

    C: "財務體質普通，建議優先處理紅黃燈項目。",

    D: "財務體質需要關注，建議盡快調整收支與資產結構。",

  }[calc.grade];

 

  const indicators = [

    { title: "生活支出佔比", value: pct(calc.lifeRatio), target: "≤ 60%", level: calc.lifeLevel,

      advice: calc.lifeLevel === "green" ? "支出控制得當，財務空間健康。" : calc.lifeLevel === "yellow" ? "生活支出開始擠壓財務空間，建議檢視非必要開銷。" : "入不敷出風險高，建議優先削減固定與變動支出。" },

    { title: "儲蓄投資佔比", value: pct(calc.savingRatio), target: "≥ 30%", level: calc.savingLevel,

      advice: calc.savingLevel === "green" ? "儲蓄動能充足，資產可持續累積。" : calc.savingLevel === "yellow" ? "累積速度偏慢，可評估提高定期定額金額。" : "財富成長嚴重不足，建議重新檢視收支結構，提高儲蓄比例。" },

    { title: "保險佔比", value: pct(calc.riskRatio), target: "5% ~ 15%", level: calc.riskLevel,

      advice: calc.riskLevel === "green" ? "保障與保費負擔相對平衡。" : calc.riskRatio < 0.05 ? "保障可能不足，建議檢視風險缺口。" : "保費佔比偏高，建議檢視險種結構是否重複或過量。" },

    { title: "緊急預備金", value: `${calc.emergencyMonths.toFixed(1)} 個月`, target: "≥ 6 個月", level: calc.emergencyLevel,

      advice: calc.emergencyLevel === "green" ? "現金水位安全，足以應對突發狀況。" : calc.emergencyLevel === "yellow" ? "可接受，但建議持續補足現金水位。" : "高風險，建議優先暫緩投資，把現金拉高到 3 個月以上。" },

    { title: "資產配置風險", value: pct(calc.highPct), target: "高波動 ≤ 50%", level: calc.assetLevel, advice: calc.assetNote },

  ];

  const levelLabel = { green: "綠燈", yellow: "黃燈", red: "紅燈" };

 

  const exportExcel = () => {

    const wb = XLSX.utils.book_new();

    const today = new Date().toLocaleDateString("zh-Hant-TW");

 

    const assetRows = [["分類", "項目", "金額"]];

    ASSET_GROUPS.forEach((g) => assets[g.key].forEach((it) => assetRows.push([g.label, it.name, parseFloat(it.amount) || 0])));

    assetRows.push(["", "低波動資產小計", calc.totalLow]);

    assetRows.push(["", "中波動資產小計", calc.totalMid]);

    assetRows.push(["", "高波動資產小計", calc.totalHigh]);

    assetRows.push(["", "總資產", calc.totalAssets === 1 ? 0 : calc.totalAssets]);

    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(assetRows), "資產盤點");

 

    const cfRows = [["類型", "項目", "金額", "週期", "月均額"]];

    income.active.forEach((it) => cfRows.push(["主動收入", it.name, parseFloat(it.amount) || 0, it.freq, monthly(it)]));

    income.passive.forEach((it) => cfRows.push(["被動收入", it.name, parseFloat(it.amount) || 0, it.freq, monthly(it)]));

    expense.forEach((it) => cfRows.push(["消費支出", it.name, parseFloat(it.amount) || 0, it.freq, monthly(it)]));

    saving.forEach((it) => cfRows.push(["投資儲蓄", it.name, parseFloat(it.amount) || 0, it.freq, monthly(it)]));

    risk.forEach((it) => cfRows.push(["風險支出", it.name, parseFloat(it.amount) || 0, it.freq, monthly(it)]));

    cfRows.push(["", "月總收入", "", "", calc.totalIncome]);

    cfRows.push(["", "月總支出", "", "", calc.totalExpense + calc.totalSaving + calc.totalRisk]);

    cfRows.push(["", "淨現金流", "", "", calc.totalIncome - calc.totalExpense - calc.totalSaving - calc.totalRisk]);

    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(cfRows), "收支記帳");

 

    const sumRows = [["姓名", name || "未填寫"], ["匯出日期", today], ["整體健康度", calc.grade], []];

    sumRows.push(["指標", "數值", "建議區間", "燈號", "健檢建議"]);

    indicators.forEach((i) => sumRows.push([i.title, i.value, i.target, levelLabel[i.level], i.advice]));

    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(sumRows), "健檢摘要");

 

    XLSX.writeFile(wb, `理財健檢_${name || "使用者"}_${today}.xlsx`);

  };

 

  const exportPDF = () => {

    window.print();

  };

 

  const tabs = [

    { key: "asset", label: "資產盤點", Icon: Landmark },

    { key: "cashflow", label: "收支記帳", Icon: Wallet },

    { key: "dashboard", label: "健檢結果", Icon: Gauge },

  ];

 

  return (

    <div style={{ background: PAPER, minHeight: "100vh", fontFamily: "'Noto Sans TC', sans-serif", color: INK }}>

      <div className="app-screen" style={{ maxWidth: 900, margin: "0 auto", padding: "28px 20px 60px" }}>

        <header style={{ marginBottom: 22, display: "flex", alignItems: "flex-end", justifyContent: "space-between", flexWrap: "wrap", gap: 16 }}>

          <div>

            <div style={{ fontSize: 12, letterSpacing: 2, color: "#9B9181", marginBottom: 4 }}>FINANCIAL CHECK-UP</div>

            <h1 style={{ fontFamily: "'Noto Serif TC', serif", fontWeight: 900, fontSize: 30, margin: 0 }}>理財健檢</h1>

          </div>

          <div>

            <label style={{ fontSize: 12, color: "#9B9181", display: "block", marginBottom: 4 }}>姓名</label>

            <input

              value={name}

              onChange={(e) => setName(e.target.value)}

              placeholder="請輸入姓名"

              style={{

                border: `1px solid ${LINE}`, borderRadius: 8, padding: "8px 12px", fontSize: 15, width: 180,

                fontFamily: "'Noto Sans TC', sans-serif", color: INK, background: "#fff",

              }}

            />

          </div>

        </header>

 

        <nav style={{ display: "flex", gap: 4, marginBottom: 26, borderBottom: `1px solid ${LINE}` }}>

          {tabs.map((t) => (

            <button

              key={t.key}

              onClick={() => setTab(t.key)}

              style={{

                display: "inline-flex", alignItems: "center", gap: 6,

                border: "none", background: "transparent", cursor: "pointer", padding: "10px 4px", marginRight: 22,

                fontFamily: "'Noto Serif TC', serif", fontSize: 15, fontWeight: 700,

                color: tab === t.key ? INK : "#9B9181",

                borderBottom: tab === t.key ? `2px solid ${INK}` : "2px solid transparent",

              }}

            >

              <t.Icon size={16} />{t.label}

            </button>

          ))}

        </nav>

 

        {tab === "asset" && (

          <section>

            <p style={{ fontSize: 13, color: "#5A5443", marginTop: -8, marginBottom: 18 }}>

              填入目前持有的資產與金額，系統會自動依風險波動度分類加總。

            </p>

            {ASSET_GROUPS.map((g) => (

              <CategoryBlock

                key={g.key}

                title={g.label}

                accent={g.color}

                icon={<g.Icon size={17} />}

                items={assets[g.key]}

                setItems={(items) => setAssets((a) => ({ ...a, [g.key]: items }))}

                presets={g.presets}

                showFreq={false}

              />

            ))}

            <div style={{ marginTop: 8, padding: 16, background: "#fff", borderRadius: 12, border: `1px solid ${LINE}`, fontFamily: "'IBM Plex Mono', monospace" }}>

              總資產 {fmt(calc.totalAssets === 1 ? 0 : calc.totalAssets)}　

              <span style={{ color: ASSET_GROUPS[0].color }}>低 {pct(calc.totalLow / (calc.totalAssets || 1))}</span>　

              <span style={{ color: ASSET_GROUPS[1].color }}>中 {pct(calc.totalMid / (calc.totalAssets || 1))}</span>　

              <span style={{ color: ASSET_GROUPS[2].color }}>高 {pct(calc.totalHigh / (calc.totalAssets || 1))}</span>

            </div>

          </section>

        )}

 

        {tab === "cashflow" && (

          <section>

            <p style={{ fontSize: 13, color: "#5A5443", marginTop: -8, marginBottom: 18 }}>

              每筆收支都可以選擇「月繳」或「年繳」，系統會自動換算成月均額再進行健檢計算。

            </p>

 

            <h2 style={{ display: "flex", alignItems: "center", gap: 8, fontFamily: "'Noto Serif TC', serif", fontSize: 18, margin: "0 0 12px" }}>

              <Wallet size={19} />現金收入

            </h2>

            {INCOME_GROUPS.map((g) => (

              <CategoryBlock

                key={g.key}

                title={g.label}

                accent="#4F7A6B"

                icon={<g.Icon size={16} />}

                items={income[g.key]}

                setItems={(items) => setIncome((a) => ({ ...a, [g.key]: items }))}

                presets={g.presets}

                showFreq={true}

                subtotalLabel="月均"

              />

            ))}

 

            <h2 style={{ display: "flex", alignItems: "center", gap: 8, fontFamily: "'Noto Serif TC', serif", fontSize: 18, margin: "20px 0 12px" }}>

              <ArrowDownCircle size={19} />支出與儲蓄

            </h2>

            <CategoryBlock title="消費支出" accent="#A24B3F" icon={<Wallet size={16} />} items={expense} setItems={setExpense} presets={EXPENSE_PRESETS} showFreq={true} subtotalLabel="月均" />

            <CategoryBlock title="投資儲蓄支出" accent="#B98B2A" icon={<TrendingUp size={16} />} items={saving} setItems={setSaving} presets={SAVING_PRESETS} showFreq={true} subtotalLabel="月均" />

            <CategoryBlock title="風險支出（保險）" accent="#6E6A8C" icon={<ShieldCheck size={16} />} items={risk} setItems={setRisk} presets={RISK_PRESETS} showFreq={true} subtotalLabel="月均" />

 

            <div style={{ marginTop: 8, padding: 16, background: "#fff", borderRadius: 12, border: `1px solid ${LINE}`, fontFamily: "'IBM Plex Mono', monospace", fontSize: 14 }}>

              月收入 {fmt(calc.totalIncome)}　月支出 {fmt(calc.totalExpense + calc.totalSaving + calc.totalRisk)}　

              淨現金流 <span style={{ color: calc.totalIncome - calc.totalExpense - calc.totalSaving - calc.totalRisk >= 0 ? "#3E7A4F" : "#A24B3F" }}>

                {fmt(calc.totalIncome - calc.totalExpense - calc.totalSaving - calc.totalRisk)}

              </span>

            </div>

          </section>

        )}

 

        {tab === "dashboard" && (

          <section>

            <div style={{ display: "flex", gap: 10, marginBottom: 16, flexWrap: "wrap" }}>

              <button onClick={exportExcel} style={{

                display: "inline-flex", alignItems: "center", gap: 6, border: `1px solid ${LINE}`, background: "#fff",

                borderRadius: 8, padding: "8px 14px", fontSize: 13, fontFamily: "'Noto Sans TC', sans-serif", color: INK, cursor: "pointer",

              }}>

                <FileSpreadsheet size={15} /> 匯出 Excel

              </button>

              <button onClick={exportPDF} style={{

                display: "inline-flex", alignItems: "center", gap: 6, border: `1px solid ${LINE}`, background: "#fff",

                borderRadius: 8, padding: "8px 14px", fontSize: 13, fontFamily: "'Noto Sans TC', sans-serif", color: INK, cursor: "pointer",

              }}>

                <FileText size={15} /> 匯出 PDF 報告

              </button>

            </div>

 

            <div style={{

              background: "#fff", border: `1px solid ${LINE}`, borderRadius: 16, padding: 24,

              display: "flex", alignItems: "center", gap: 22, marginBottom: 20,

            }}>

              <div style={{

                width: 78, height: 78, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center",

                border: `4px solid ${gradeColor}`, fontFamily: "'Noto Serif TC', serif", fontWeight: 900, fontSize: 32, color: gradeColor,

              }}>

                {calc.grade}

              </div>

              <div>

                <div style={{ fontFamily: "'Noto Serif TC', serif", fontWeight: 700, fontSize: 18 }}>整體財務健康度</div>

                <div style={{ fontSize: 13, color: "#5A5443", marginTop: 4 }}>

                  {calc.redCount === 0

                    ? "各項指標表現穩健，持續維持現有節奏即可。"

                    : `目前有 ${calc.redCount} 項指標亮紅燈，建議優先處理下方標註的項目。`}

                </div>

              </div>

            </div>

 

            <h2 style={{ display: "flex", alignItems: "center", gap: 8, fontFamily: "'Noto Serif TC', serif", fontSize: 17, margin: "4px 0 12px" }}>

              <Gauge size={19} />人生黃金分配比例

            </h2>

            <div style={{ display: "flex", flexWrap: "wrap", gap: 14, marginBottom: 24 }}>

              <IndicatorCard

                icon={<Wallet size={17} />} title="生活支出佔比" value={pct(calc.lifeRatio)} target="≤ 60%" level={calc.lifeLevel}

                advice={calc.lifeLevel === "green" ? "支出控制得當，財務空間健康。" : calc.lifeLevel === "yellow" ? "生活支出開始擠壓財務空間，建議檢視非必要開銷。" : "入不敷出風險高，建議優先削減固定與變動支出。"}

              />

              <IndicatorCard

                icon={<TrendingUp size={17} />} title="儲蓄投資佔比" value={pct(calc.savingRatio)} target="≥ 30%" level={calc.savingLevel}

                advice={calc.savingLevel === "green" ? "儲蓄動能充足，資產可持續累積。" : calc.savingLevel === "yellow" ? "累積速度偏慢，可評估提高定期定額金額。" : "財富成長嚴重不足，建議重新檢視收支結構，提高儲蓄比例。"}

              />

              <IndicatorCard

                icon={<ShieldCheck size={17} />} title="保險佔比" value={pct(calc.riskRatio)} target="5% ~ 15%" level={calc.riskLevel}

                advice={calc.riskLevel === "green" ? "保障與保費負擔相對平衡。" : calc.riskRatio < 0.05 ? "保障可能不足，建議檢視風險缺口。" : "保費佔比偏高，建議檢視險種結構是否重複或過量。"}

              />

            </div>

 

            <h2 style={{ display: "flex", alignItems: "center", gap: 8, fontFamily: "'Noto Serif TC', serif", fontSize: 17, margin: "4px 0 12px" }}>

              <PiggyBank size={19} />預備金與資產配置

            </h2>

            <div style={{ display: "flex", flexWrap: "wrap", gap: 14 }}>

              <IndicatorCard

                icon={<PiggyBank size={17} />} title="緊急預備金" value={`${calc.emergencyMonths.toFixed(1)} 個月`} target="≥ 6 個月" level={calc.emergencyLevel}

                advice={calc.emergencyLevel === "green" ? "現金水位安全，足以應對突發狀況。" : calc.emergencyLevel === "yellow" ? "可接受，但建議持續補足現金水位。" : "高風險，建議優先暫緩投資，把現金拉高到 3 個月以上。"}

              />

              <IndicatorCard

                icon={<AlertTriangle size={17} />} title="資產配置風險" value={pct(calc.highPct)} target="高波動 ≤ 50%" level={calc.assetLevel}

                advice={calc.assetNote}

              />

            </div>

          </section>

        )}

      </div>

 

      <div className="print-only" style={{ padding: 32, fontFamily: "'Noto Sans TC', sans-serif", color: INK }}>

        <div style={{ fontSize: 11, letterSpacing: 2, color: "#9B9181", marginBottom: 4 }}>FINANCIAL CHECK-UP REPORT</div>

        <h1 style={{ fontFamily: "'Noto Serif TC', serif", fontWeight: 900, fontSize: 26, margin: "0 0 4px" }}>理財健檢報告</h1>

        <div style={{ fontSize: 13, color: "#5A5443", marginBottom: 18 }}>

          姓名：{name || "未填寫"}　匯出日期：{new Date().toLocaleDateString("zh-Hant-TW")}

        </div>

 

        <div style={{ border: `1px solid ${LINE}`, borderRadius: 10, padding: 16, marginBottom: 20, display: "flex", alignItems: "center", gap: 16 }}>

          <div style={{

            width: 56, height: 56, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center",

            border: `3px solid ${gradeColor}`, fontFamily: "'Noto Serif TC', serif", fontWeight: 900, fontSize: 24, color: gradeColor,

          }}>

            {calc.grade}

          </div>

          <div style={{ fontSize: 13 }}>{gradeText}</div>

        </div>

 

        <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13, marginBottom: 24 }}>

          <thead>

            <tr style={{ borderBottom: `2px solid ${INK}`, textAlign: "left" }}>

              <th style={{ padding: "6px 8px" }}>指標</th>

              <th style={{ padding: "6px 8px" }}>數值</th>

              <th style={{ padding: "6px 8px" }}>建議區間</th>

              <th style={{ padding: "6px 8px" }}>燈號</th>

              <th style={{ padding: "6px 8px" }}>健檢建議</th>

            </tr>

          </thead>

          <tbody>

            {indicators.map((it) => (

              <tr key={it.title} style={{ borderBottom: `1px solid ${LINE}` }}>

                <td style={{ padding: "8px" }}>{it.title}</td>

                <td style={{ padding: "8px", fontFamily: "'IBM Plex Mono', monospace" }}>{it.value}</td>

                <td style={{ padding: "8px", color: "#5A5443" }}>{it.target}</td>

                <td style={{ padding: "8px" }}>{levelLabel[it.level]}</td>

                <td style={{ padding: "8px", color: "#5A5443" }}>{it.advice}</td>

              </tr>

            ))}

          </tbody>

        </table>

 

        <h2 style={{ display: "flex", alignItems: "center", gap: 6, fontFamily: "'Noto Serif TC', serif", fontSize: 15, margin: "0 0 8px" }}><Landmark size={15} />資產配置</h2>

        <div style={{ fontSize: 13, marginBottom: 24 }}>

          總資產 {fmt(calc.totalAssets === 1 ? 0 : calc.totalAssets)}　

          低波動 {pct(calc.totalLow / (calc.totalAssets || 1))}　

          中波動 {pct(calc.totalMid / (calc.totalAssets || 1))}　

          高波動 {pct(calc.totalHigh / (calc.totalAssets || 1))}

        </div>

 

        <h2 style={{ display: "flex", alignItems: "center", gap: 6, fontFamily: "'Noto Serif TC', serif", fontSize: 15, margin: "0 0 8px" }}><Wallet size={15} />月收支概況</h2>

        <div style={{ fontSize: 13 }}>

          月收入 {fmt(calc.totalIncome)}　月支出 {fmt(calc.totalExpense + calc.totalSaving + calc.totalRisk)}　

          淨現金流 {fmt(calc.totalIncome - calc.totalExpense - calc.totalSaving - calc.totalRisk)}

        </div>

      </div>

    </div>

  );

}

 

ReactDOM.createRoot(document.getElementById("root")).render(<FinancialHealthApp />);

</script>

</body>

</html>
